<style>
:root{
  --bg:#070a12;--card:#0b1020;--line:#111827;
  --text:#e5e7eb;--muted:#9ca3af;--red:#ff2d2d;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:system-ui;
  background:radial-gradient(800px 400px at 50% -10%,rgba(255,45,45,.15),transparent),
             var(--bg);
  color:var(--text);
}
.wrap{max-width:1000px;margin:auto;padding:28px}
.card{
  background:linear-gradient(180deg,rgba(11,16,32,.95),rgba(7,10,18,.9));

  border-radius:22px;
  padding:28px;

}
h1{font-size:42px;margin:0}
.tag{color:var(--muted);margin-top:10px;line-height:1.6}
.nav{margin-top:20px;display:flex;gap:12px;flex-wrap:wrap}
a.btn{
  padding:10px 16px;border-radius:14px;
  border:1px solid var(--line);
  text-decoration:none;color:var(--text);
  background:rgba(0,0,0,.3);
  transition:.25s;
}
a.btn:hover{
  border-color:var(--red);
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(255,45,45,.15);
}
.grid{
  margin-top:24px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
.box{
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  background:rgba(11,16,32,.7);
}
.box b{color:var(--red)}
footer{text-align:center;margin:28px 0;color:var(--muted)}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
